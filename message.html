<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid with you 💖🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Cairo', sans-serif;
    background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    color:#fff;
    overflow-x:hidden;
    padding-bottom:80px;
}

/* ✨ لمعة */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 20% 30%, rgba(255,215,0,.2), transparent),
               radial-gradient(circle at 80% 70%, rgba(255,255,255,.1), transparent);
    z-index:-1;
}

/* ❌ إخفاء الهلال والنجوم بدون حذفهم */
.moon{display:none;}
.star{display:none;}

/* العنوان */
.title-frame{
    text-align:center;
    margin:30px auto;
    padding:15px 30px;
    border:2px solid gold;
    width:fit-content;
    border-radius:20px;
    font-size:28px;
    font-weight:bold;
    background:rgba(0,0,0,.4);
    box-shadow:0 0 25px rgba(255,215,0,.6);
}

/* الفريم */
.frame{
    border:6px solid gold;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,215,0,.5);
}

.video-frame{
    width:350px;
    margin:20px auto;
    padding:12px;
    border:2px solid gold;
    border-radius:18px;
    background:rgba(0,0,0,.4);
    box-shadow:0 0 20px rgba(255,215,0,.4);
}

.decor{
    text-align:center;
    font-size:22px;
    margin:25px 0;
    color:gold;
}

.footer-text{
    text-align:center;
    font-size:20px;
    margin-top:25px;
    line-height:1.7;
}

/* 🎈 بالونات */
.balloon{
position:fixed;
bottom:-150px;
font-size:40px;
animation:floatUp 8s linear infinite;
}
@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* 🎊 كونفتي */
.confetti{
position:fixed;
top:-20px;
font-size:20px;
animation:fall 4s linear infinite;
}
@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="moon">🌙</div>

<div class="title-frame"> 🎉 عيد سعيد يا دودو 💖</div>

<div class="frame-container">
<div class="frame">
<img src="1764248956999.jpg" class="photo">
</div>
</div>

<button class="msg-btn" onclick="toggleMessage()">💌 رسالة ل دودو </button>

<div id="messageBox" style="display:none;text-align:center;">
<img src="Dodo's message.jpg" style="width:330px;border-radius:15px;">
</div>

<!-- الفيديوهات كلها زي ما هي -->
<div class="video-frame"><video id="v1" width="100%"><source src="D36809643135.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v1',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="video-frame"><video id="v2" width="100%"><source src="Asala_details_something.mp4.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v2',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="video-frame"><video id="v3" width="100%"><source src="VID_20251128_131744_658.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v3',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="video-frame"><video id="v4" width="100%"><source src="R4684478532.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v4',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="decor">🎉 ✨ 🎉 ✨ 🎉</div>

<div class="footer-text">1/12/2025 🥰♥️</div>

<div class="video-frame"><video id="v5" width="100%"><source src="VID_20251201_000802_188.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v5',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="video-frame"><video id="v6" width="100%"><source src="VN٢٠٢٥١٢٠١_٠٠٢١٣٩.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v6',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="video-frame"><video id="v7" width="100%"><source src="VID_20260306_004438_075.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v7',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="video-frame"><video id="v8" width="100%"><source src="Cfjf883838826_4290cyr3.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v8',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="video-frame"><video id="v9" width="100%"><source src="VID_20260318_004903_880.mp4"></video></div>
<button class="vbtn" onclick="toggleVid('v9',this)">▶ تشغيل / ⏸ إيقاف</button>

<div class="decor">🎉 ✨ 🎉 ✨ 🎉</div>

<img src="IMG_20251201_114150_508.jpg" style="width:330px;display:block;margin:20px auto;border-radius:15px;border:2px solid gold;">

<div class="footer-text">
أتمنّى أن تدركِ أنني لا أراك كبديلٍ<br>
أو كخطّةٍ إحتياطيّة<br>
لطالما رأيتُك الطريقَ كلُّه<br>
والوصول والنّجاة ♥️🗝
</div>

<div style="max-width:400px; margin:50px auto; text-align:center;">
<h2 style="color:gold;"> 💌 رسالتك ليا في العيد </h2>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<form action="https://formsubmit.co/bodyashraf244@gmail.com"
method="POST"
target="hidden_iframe"
onsubmit="showMessage();">

<textarea name="message" placeholder="🎉 اكتبلي كلمة حلوة..."
required style="width:100%; height:120px; padding:10px; border-radius:10px;"></textarea>

<input type="hidden" name="_subject" value="💌 رسالة جديدة من موقع دودو">
<input type="hidden" name="_captcha" value="false">

<br><br>
<button type="submit">إرسال ✨</button>
</form>

<p id="successMsg" style="display:none; color:#4caf50; margin-top:15px;">
وصلتني رسالتك 🤍🎉
</p>
</div>

<script>

function toggleMessage(){
const box=document.getElementById("messageBox");
box.style.display=box.style.display==="none"?"block":"none";
}

function toggleVid(id,btn){
const v=document.getElementById(id);
if(v.paused){v.play();btn.innerHTML="⏸ إيقاف";}
else{v.pause();btn.innerHTML="▶ تشغيل";}
}

function showMessage(){
setTimeout(()=>{
document.getElementById("successMsg").style.display="block";
},800);
}

/* 🎈 بالونات */
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML=Math.random()>0.5?"🎈":"🎁";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(b);
}

/* 🎊 كونفتي */
setInterval(()=>{
let c=document.createElement("div");
c.className="confetti";
c.innerHTML=Math.random()>0.5?"🎉":"✨";
c.style.left=Math.random()*100+"%";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},300);

</script>

</body>
</html>
