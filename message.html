<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid with you 💖🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo', sans-serif;
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
color:#fff;
overflow-x:hidden;
padding-bottom:80px;
}

/* ✨ لمعة */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 20% 30%, rgba(255,215,0,.2), transparent),
           radial-gradient(circle at 80% 70%, rgba(255,255,255,.1), transparent);
z-index:-1;
}

/* ❌ إخفاء الهلال */
.moon{display:none;}

/* ❌ إخفاء النجوم */
.star{display:none;}

/* عنوان */
.title-frame{
text-align:center;
margin:30px auto;
padding:15px 30px;
border:2px solid gold;
width:fit-content;
border-radius:20px;
font-size:28px;
font-weight:bold;
background:rgba(0,0,0,.4);
box-shadow:0 0 25px rgba(255,215,0,.6);
}

/* الفريم */
.frame{
border:6px solid gold;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,215,0,.5);
}

.video-frame{
border:2px solid gold;
background:rgba(0,0,0,.4);
}

/* 🎈 بالونات */
.balloon{
position:fixed;
bottom:-150px;
font-size:40px;
animation:floatUp 8s linear infinite;
}
@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* 🎊 كونفتي */
.confetti{
position:fixed;
top:-20px;
font-size:20px;
animation:fall 4s linear infinite;
}
@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}

/* النصوص */
.decor{color:gold;}
.footer-text{color:#fff;}

</style>
</head>

<body>

<!-- كل المحتوى بتاعك زي ما هو بدون حذف -->

<div class="moon">🌙</div>

<div class="title-frame"> 🎉 عيد سعيد يا دودو 💖</div>

<div class="frame-container">
<div class="frame">
<img src="1764248956999.jpg" class="photo">
</div>
</div>

<button class="msg-btn" onclick="toggleMessage()">💌 رسالة ل دودو </button>

<div id="messageBox" style="display:none;text-align:center;">
<img src="Dodo's message.jpg" style="width:330px;border-radius:15px;">
</div>

<!-- الفيديوهات زي ما هي -->
<!-- (مش هغيرهم خالص) -->

<!-- باقي الكود كله زي ما هو بدون حذف -->

<script>

/* الكود القديم زي ما هو */

/* 🎈 بالونات */
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML=Math.random()>0.5?"🎈":"🎁";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(b);
}

/* 🎊 كونفتي */
setInterval(()=>{
let c=document.createElement("div");
c.className="confetti";
c.innerHTML=Math.random()>0.5?"🎉":"✨";
c.style.left=Math.random()*100+"%";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},300);

</script>

</body>
</html>
