<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Happy Eid with Do3ty 🎉♥️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
font-family:"Cairo",sans-serif;
overflow-x:hidden;
color:white;
}

/* لمعة خفيفة */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 20% 30%, rgba(255,215,0,.2), transparent),
           radial-gradient(circle at 80% 70%, rgba(255,255,255,.1), transparent);
z-index:-1;
}

/* عنوان */
.eid-title{
text-align:center;
font-size:45px;
color:gold;
margin-top:120px;
text-shadow:0 0 15px gold;
}

/* صور */
.photo{
width:94%;
display:block;
margin:25px auto;
border-radius:20px;
box-shadow:0 8px 25px rgba(255,255,255,.3);
}

/* نص */
.text-box{
text-align:center;
margin-bottom:25px;
font-size:20px;
font-weight:bold;
}

/* أزرار */
.btn{
display:block;
margin:20px auto;
padding:12px 25px;
background:gold;
color:black;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

/* زر الصفحة التانية */
#goMsg{
margin:40px auto;
display:block;
background:white;
padding:12px 30px;
font-size:20px;
color:black;
border-radius:25px;
text-align:center;
width:fit-content;
text-decoration:none;
font-weight:bold;
}

/* تسجيل الدخول */
#loginScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#loginBox{
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
border:2px solid gold;
}

#pwd{
padding:10px;
border-radius:10px;
border:1px solid gold;
text-align:center;
}

#loginBtn{
margin-top:10px;
padding:10px 20px;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
}

#errorMsg{
color:red;
display:none;
margin-top:10px;
}

/* 🎈 بالونات */
.balloon{
position:fixed;
bottom:-150px;
font-size:40px;
animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* 🎊 كونفتي */
.confetti{
position:fixed;
top:-20px;
font-size:20px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="eid-title">🎉 عيد سعيد يا دودو 💖</div>

<!-- تسجيل الدخول -->
<div id="loginScreen">
<div id="loginBox">
<h2>Access for My Queen 👑</h2>
<input type="password" id="pwd">
<button id="loginBtn">دخول</button>
<div id="errorMsg">غلط يا دودو 🥺</div>
</div>
</div>

<!-- محتواك زي ما هو -->
<img src="Howl9939ej3ikn99399.jpg" class="photo">
<div class="text-box">كل سنة وانتي طيبة يا أجمل حاجة في حياتي 💖</div>

<img src="48501a3cd0ffd3b5c11411651d43b36b.jpg" class="photo">
<div class="text-box">يارب تكوني أسعد إنسانة في الدنيا 🎉✨</div>

<img src="5e9cf4903041a56951bf28c0286a026f.jpg" class="photo">
<div class="text-box">وجودك في حياتي هو العيد الحقيقي 💛</div>

<img src="82ae37130c74dc47e09559f89ad11ab5.jpg" class="photo">
<div class="text-box">كل سنة وانتي روحي ♥️</div>

<!-- الأغنية -->
<audio id="song"><source src="5976444834_yb778hw7u.mp3"></audio>
<button class="btn" id="songBtn">🎵 تشغيل الأغنية</button>

<!-- الفيديو -->
<video id="vid" style="display:none;" src="VID_20260309_220809_870.mp4"></video>
<button class="btn" id="vidBtn">🎥 تشغيل الفيديو</button>

<!-- زر الصفحة التانية -->
<a id="goMsg" href="message.html">🎁 مفاجأة</a>

<script>

/* تسجيل الدخول */
document.getElementById("loginBtn").onclick=function(){
let v=document.getElementById("pwd").value.trim();
if(v==="Do3ty♡"){
document.getElementById("loginScreen").style.display="none";
}else{
document.getElementById("errorMsg").style.display="block";
}
};

/* الأغنية */
const song=document.getElementById("song");
const songBtn=document.getElementById("songBtn");
let playingSong=false;

songBtn.onclick=()=>{
if(!playingSong){
song.play();
playingSong=true;
songBtn.innerText="⏸️ إيقاف";
}else{
song.pause();
playingSong=false;
songBtn.innerText="🎵 تشغيل";
}
};

/* الفيديو */
const vid=document.getElementById("vid");
const vidBtn=document.getElementById("vidBtn");
let playingVid=false;

vidBtn.onclick=()=>{
if(!playingVid){
vid.style.display="block";
vid.play();
playingVid=true;
}else{
vid.pause();
playingVid=false;
}
};

/* 🎈 بالونات */
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.classList.add("balloon");
b.innerHTML=Math.random()>0.5?"🎈":"🎁";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(b);
}

/* 🎊 كونفتي */
setInterval(()=>{
let c=document.createElement("div");
c.classList.add("confetti");
c.innerHTML=Math.random()>0.5?"🎉":"✨";
c.style.left=Math.random()*100+"%";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},300);

</script>

</body>
</html>
